# Lado derecho: trackball PMW3610 (driver badjeff "pixart,pmw3610-alt").
# Se anade encima de corne.conf (que ya trae el RGB underglow comun a ambos lados).
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_PMW3610_ALT=y

# Descomentar SOLO si el log muestra "Incorrect product id 0xFF (expecting 0x3E)!"
# (problema de timing de alimentacion del sensor al arrancar):
# CONFIG_PMW3610_ALT_INIT_POWER_UP_EXTRA_DELAY_MS=1000

# Para depurar el sensor por consola USB/RTT (dejar comentado en uso normal):
# CONFIG_PMW3610_ALT_LOG_LEVEL_DBG=y
