# Configuracion comun del Corne para la mitad derecha.
CONFIG_ZMK_KEYBOARD_NAME="Arf_Corne"

CONFIG_ZMK_RGB_UNDERGLOW=y
# WS2812_STRIP no existe en Zephyr 4.1. El controlador se activa desde el
# devicetree del shield.
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=20
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=20
CONFIG_ZMK_RGB_UNDERGLOW_BRT_STEP=2

# Lado derecho: trackball PMW3610 (controlador oficial de Zephyr).
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_INPUT_PMW3610=y

# Para depurar el sensor por consola USB/RTT (dejar comentado en uso normal):
CONFIG_INPUT_LOG_LEVEL_DBG=y
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=8000
